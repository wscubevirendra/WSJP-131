<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <style>
        .card {
            width: 300px;
            height: 300px;
            margin: 100px auto;
            box-shadow: 0px 2px 2px gray;
            position: relative;
        }

        .overlay {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            background-color: rgba(0, 0, 0, 0.6);
            display: none;
            left: 0;
    
        }

        .card:hover .overlay {
            display: block;
        }
    </style>
</head>

<body>
    <div class="card">
        <img width="100%" height="100%" src="planet-volumes-8FELip6osY0-unsplash.jpg" alt="">
        <div class="overlay"></div>
    </div>

</body>

</html>
