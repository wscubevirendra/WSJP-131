<!DOCTYPE html>
<html lang="en">

<head>

    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .container {
            width: 900px;
            height: 300px;
            border: 2px solid red;
            margin: auto;
            display: flex;
        }

        .card {
            width: 200px;
            height: 200px;
            border: 2px solid green;
            font-size: 50px;
            text-align: center;
            padding-top: 30px;
            flex-shrink: 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">1</div>
        <div class="card">2</div>
        <div class="card" >3</div>

    </div>

</body>

</html>
