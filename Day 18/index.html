<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .fluid-container {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.2);

        }

        .container {
            max-width: 1250px;
            padding: 16px;
            border: 2px solid red;
            margin: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .card {
            width: calc(25% - 20px);
            padding: 20px;
            font-size: 50px;
            text-align: center;
            color: white;
        }

        .card:nth-child(even) {
            background-color: brown;
        }


        .card:nth-child(odd) {
            background-color: gold;
        }


        @media (width<=992px) {
            .card {
                width: calc(33.33% - 20px);
                padding: 15px;
                font-size: 25px;


            }
        }

        @media (width<=768px) {
            .card {
                width: calc(50% - 20px);
                padding: 12px;
                font-size: 20px;

            }
        }

        @media (width<=576px) {
            .card {
                width: calc(100% - 20px);
                padding: 10px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <div class="fluid-container">
        <div class="container">
            <div class="card">1</div>
            <div class="card">2</div>
            <div class="card">3</div>
            <div class="card">4</div>
            <div class="card">4</div>
            <div class="card">4</div>
            <div class="card">4</div>
            <div class="card">4</div>
            <div class="card">4</div>

        </div>
    </div>

</body>

</html>
