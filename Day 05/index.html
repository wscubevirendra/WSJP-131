<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            width: 1000px;
            height: 300px;
            background-color: red;
            margin: auto;
        }

        .row1 {
            width: 1000px;
            height: 100px;
            border: 10px solid green;
            box-sizing: border-box;
        }

        .row2 {
            width: 1000px;
            height: 200px;
            display: flex;
        }

        .card {
            height: 200px;
            width: 500px;
            border: 2px solid blue;
            box-sizing: border-box;

        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row1"></div>
        <div class="row2">
            <div class="card"></div>
            <div class="card"></div>
        </div>

    </div>

</body>

</html>
