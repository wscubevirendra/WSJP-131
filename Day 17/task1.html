<!DOCTYPE html>
<html lang="en">

<head>

    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .container {
            width: 900px;
            height: 400px;
            border: 2px double red;
            margin: 50px auto;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }


        .box {
            width: 100px;
            height: 30px;
            border: 2px solid green;
            animation: race 6s infinite;
        }

        @keyframes race {
            0% {
                transform: translateX(0px);
            }

            50% {
                transform: translateX(800px);

            }

            100% {
                transform: translateX(0px);

            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box" style="animation-timing-function: ease;">ease</div>
        <div class="box" style="animation-timing-function: ease-in;">ease-in</div>
        <div class="box" style="animation-timing-function: ease-out;">ease-out</div>
        <div class="box" style="animation-timing-function: ease-in-out;">ease-in/out</div>
        <div class="box" style="animation-timing-function: linear;">linear</div>

    </div>

</body>

</html>
