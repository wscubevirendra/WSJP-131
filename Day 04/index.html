<!DOCTYPE html>
<html lang="en">

<head>

    <title>Document</title>
    <style>
        .container {
            width: 800px;
            height: 400px;
            background-color: black;

        }

        .row1 {
            width: 800px;
            height: 100px;
            background-color: red;
        }

        .row2 {
            width: 800px;
            height: 300px;
            background-color: yellow;
            display: flex;
        }

        .r2col {
            width: 200px;
            height: 300px;

        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row1"></div>
        <div class="row2">
            <div class="r2col" style="background-color:brown;">1</div>
            <div class="r2col" style="background-color: violet; width: 400px;">2</div>
            <div class="r2col" style="background-color: seagreen;">3</div>
        </div>

    </div>

</body>

</html>
