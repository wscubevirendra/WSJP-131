    //calculater

    function calc(x, y, sign) {
        let result = "";
        if (sign === "+") {
            result = x + y
        } else if (sign === "-") {
            result = x - y
        } else if (sign === "/") {
            result = x / y
        } else if (sign === "%") {
            result = x % y
        } else {
            result = "Invalid Input"
        }

        return result
    }
