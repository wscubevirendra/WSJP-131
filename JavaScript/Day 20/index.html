<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            background-color: black;
        }

        .container {
            width: 1200px;
            margin: auto;
            padding: 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            width: calc(25% - 20px);
            padding: 10px;
            position: relative;
            overflow: hidden;
            box-shadow: 0px 0px 2px gray;
        }

        .overlay {
            position: absolute;
            bottom: -100%;
            left: 0;
            background-color: white;
            transition: 400ms;

        }

        .card img {
            width: 100%;
            height: 100%;
        }

        .card:hover .overlay {
            bottom: 0;
        }

        .input_container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        #inp {
            width: 30%;
            padding: 10px;
            outline: none;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="input_container">
        <input type="text" id="inp" placeholder="Search Movie.......">
    </div>
    <div class="container">

    </div>


    <script>
        const TOP_MOVIES_API = "https://api.themoviedb.org/3/discover/movie?sort_by=popularity.desc&api_key=04c35731a5ee918f014970082a0088b1&page=1";

        const SEARCHAPI =
            "https://api.themoviedb.org/3/search/movie?&api_key=04c35731a5ee918f014970082a0088b1&query=";

        async function getMovies(api) {
            const respose = await fetch(api);
            const data = await respose.json()
            display_movies(data.results)
        }

        getMovies(TOP_MOVIES_API)
        const container = document.querySelector(".container");

        function display_movies(movies) {
                container.innerHTML=""
            for (let data of movies) {
                const card = document.createElement("div");
                card.classList.add("card");
                card.innerHTML = `  <img src=${`https://image.tmdb.org/t/p/w1280${data.poster_path}`} alt="">
            <div class="overlay">
                <h4>${data.title}</h4>
                <p>
                   ${data.overview}
                </p>

            </div>`
                container.appendChild(card)

            }
        }

        document.querySelector("#inp").addEventListener("keyup", (event) => {
            let value = event.target.value;
            if (value == "") {
                getMovies(TOP_MOVIES_API)
            } else {
                getMovies(SEARCHAPI+value)

            }
        })

    </script>

</body>

</html>
