<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            width: 1100px;
            padding: 10px;
            /* border: 2px solid red; */
            margin: 20px auto;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .card {
            width: 200px;
            height: 200px;
            box-shadow: 0px 0px 0px 2px gray;
            cursor: pointer;

        }

        .card img {
            width: 100%;
            height: 100%;
        }

        .overlay {
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            background-color: red;
            transform: scale(0);
            transition: 400ms;
        }

        button {
            background-color: brown;
            padding: 4px 10px;
            position: fixed;
            top: 50%;
            left: 50%;
            color: white;

        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card"><img src="https://picsum.photos/200/200?random=1"></div>
        <div class="card"><img src="https://picsum.photos/200/200?random=2"></div>
        <div class="card"><img src="https://picsum.photos/200/200?random=3"></div>
        <div class="card"><img src="https://picsum.photos/200/300?random=4"></div>
        <div class="card"><img src="https://picsum.photos/200/300?random=5"></div>
        <div class="card"><img src="https://picsum.photos/200/300?random=6"></div>
        <div class="card"><img src="https://picsum.photos/200/300?random=7"></div>
        <div class="card"><img src="https://picsum.photos/200/300?random=8"></div>

    </div>

    <div class="overlay">
        <img src="" alt="" width="100%" height="100%">
        <button>Close</button>
    </div>

    <script>
        const cards = document.querySelectorAll(".card");
        const mainBox = document.querySelector(".overlay img")
        const overlay = document.querySelector(".overlay")

        cards.forEach((card, index) => {
            card.addEventListener("click", (event) => {
                mainBox.src = event.target.src;
                overlay.style.transform = "scale(1)";
            })
        })

        document.querySelector("button").addEventListener("click", () => {
            overlay.style = "";

        })
    </script>

</body>

</html>
