<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        #container {
            width: 1100px;
            padding: 10px;
            border: 2px solid red;
            margin: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .card {
            width: calc(25% - 20px);
            padding: 16px;
            box-shadow: 0px 0px 2px gray;
            background-color: white;
        }

        h5,
        p {
            font-size: 21px;
            color: gray;
        }
    </style>
</head>

<body>
    <div id="container"></div>


    <script>
        const students = [
            {
                name: "Mahesh",
                email: "mahesh@gmail.com"
            },
            {
                name: "Rohit",
                email: "rohit@gmail.com"
            },
            {
                name: "Amit",
                email: "amit@gmail.com"
            },
            {
                name: "Priya",
                email: "priya@gmail.com"
            },
            {
                name: "Neha",
                email: "neha@gmail.com"
            },
            {
                name: "Rahul",
                email: "rahul@gmail.com"
            },
            {
                name: "Karan",
                email: "karan@gmail.com"
            },
            {
                name: "Pooja",
                email: "pooja@gmail.com"
            },

        ];
        const container = document.querySelector("#container");

        function demo() {
            for (const st of students) {

                console.log(st)
                const div = document.createElement("div"); //element create
                div.classList.add("card");  // class add
                div.innerHTML = `    //innerHTML
            <h5>Name:${st.name}</h5>
            <p>Email:${st.email}</p>
            `
                container.appendChild(div)
            }
        }




        demo()


    </script>
</body>

</html>
