<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .container {
            width: 300px;
            padding: 4px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .item {
            width: 100px;
            height: 100px;
            box-shadow: 0px 0px 2px gray;
        }

        .item img {
            width: 100%;
            height: 100%;
        }

        .mainbox {
            width: 400px;
            height: 200px;
        }

        .fluid-container {
            display: flex;
        }
    </style>
</head>

<body>
    <div class="fluid-container">


        <div class="container">
            <div class="item"><img src="https://picsum.photos/200/300?random=1"></div>
            <div class="item"><img src="https://picsum.photos/200/300?random=2"></div>
            <div class="item"><img src="https://picsum.photos/200/300?random=3"></div>
            <div class="item"><img src="https://picsum.photos/200/300?random=4"></div>
        </div>
        <div class="mainbox">
            <img width="100%" height="100%" src="https://picsum.photos/200/200?random=1">
        </div>
    </div>

    <script>
        const items = document.querySelectorAll(".item");
        const main_image = document.querySelector(".mainbox img");
    
        for (const item of items) {
            item.addEventListener("click", (event) => {
                main_image.src = event.target.src
            })
        }
    </script>
</body>

</html>
